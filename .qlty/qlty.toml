config_version = "0"

exclude_patterns = [
  "*_min.*",
  "*-min.*",
  "*.min.*",
  "**/.yarn/**",
  "**/*.d.ts",
  "**/assets/**",
  "**/bower_components/**",
  "**/build/**",
  "**/cache/**",
  "**/config/**",
  "**/db/**",
  "**/deps/**",
  "**/dist/**",
  "**/extern/**",
  "**/external/**",
  "**/generated/**",
  "**/Godeps/**",
  "**/gradlew/**",
  "**/mvnw/**",
  "**/node_modules/**",
  "**/protos/**",
  "**/seed/**",
  "**/target/**",
  "**/templates/**",
  "**/testdata/**",
  "**/vendor/**",
]

test_patterns = [
  "**/test/**",
  "**/spec/**",
  "**/*.test.*",
  "**/*.spec.*",
  "**/*_test.*",
  "**/*_spec.*",
  "**/test_*.*",
  "**/spec_*.*",
]

[smells]
mode = "comment"

# radarlint のコードスメル (認知的複雑度・リテラル重複等) は助言扱いに降格する。
# CI は `qlty check --fail-level medium` で実行し、medium 以上 (errcheck・security・hadolint 等) だけを fail にする。
[[triage]]
[triage.match]
plugins = ["radarlint-go", "radarlint-iac"]
[triage.set]
level = "low"

[[source]]
name = "default"
default = true


[[plugin]]
name = "actionlint"

[[plugin]]
name = "gofmt"

[[plugin]]
name = "golangci-lint"
version = "2.12.2"
drivers = [
  "lint",
]
mode = "comment"

[[plugin]]
name = "hadolint"

[[plugin]]
name = "osv-scanner"

[[plugin]]
name = "radarlint-go"
mode = "monitor"

[[plugin]]
name = "radarlint-iac"
mode = "monitor"

[[plugin]]
name = "ripgrep"
mode = "comment"

[[plugin]]
name = "trufflehog"

[[plugin]]
name = "zizmor"
