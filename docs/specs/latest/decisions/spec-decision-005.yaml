schema_version: "1.0"
artifact_type: "decision_record"
skill_type: "specification"
artifact_id: "spec-decision-005"
title: "push 受信モードの取り込みトリガー: fsnotify イベント駆動 + 低頻度フォールバックポーリングのハイブリッド"
status: "approved"
generated_at: "2026-06-17T02:06:37+09:00"
context: |
  REQ-013 で、push 受信モードの取り込み契機を決める必要がある。受信ディレクトリの共有 FS の
  実体は導入環境により異なり(ローカルディスク / NFS / SMB)、稼働時には未確定なこともある。
  ローカルディスクなら fsnotify(inotify 等)によるイベント駆動で put を即時検知できるが、
  NFS/SMB ではリモート側の書き込みに対するカーネルイベントが届かず、fsnotify のイベントを
  取りこぼす。選択肢は (a) イベント駆動のみ (b) ポーリングのみ (c) 両者のハイブリッド。
  併せて、二系統の検知が同一ファイルを二重に拾った場合の冪等性をどう担保するかが論点となった。
decision: |
  fsnotify によるイベント駆動監視と、低頻度のフォールバックポーリングを併用するハイブリッドとする
  (取り込みトリガー方式 = イベント駆動(fsnotify) + フォールバックポーリング)。
  - fsnotify ウォッチャが受信ディレクトリの create/rename/close イベントで即時に取り込み契機を出す
    (共有 FS がローカルディスクなら即時反応)。
  - 並行して fallback_poll_interval 周期のフォールバックポーリングが受信ディレクトリを走査し、
    fsnotify が取りこぼしたファイル(NFS/SMB)を拾う。
  - フォールバック間隔は既存の pull 型 polling_interval とは別の設定 fallback_poll_interval とする。
  - イベント駆動とフォールバックが同一ファイルを二重検知しても、処理済み管理の照合と
    message_id 採番(収集時刻 + Topic + 元ファイル名)により同一ファイルを 1 回だけ取り込む(冪等)。
  ウォッチャ登録に失敗しても、フォールバックポーリングで縮退継続し、デーモンは停止しない。
  理由: 共有 FS の実体を稼働前に確定できなくても両対応で確実に取り込め(REQ-013)、
  ローカルディスクでは即時性、NFS/SMB では確実性を両立できる。冪等性は既存の処理済み管理・
  message_id 採番の仕組みをそのまま使えるため、新たな重複排除機構を発明しなくてよい。
consequences:
  positive:
    - "共有 FS の実体(ローカルディスク/NFS/SMB)に依存せず取り込める(REQ-013 受け入れ条件: 両環境で取り込み)"
    - "ローカルディスクではポーリング間隔を待たず即時取り込み、NFS/SMB ではフォールバック周期内に確実に取り込み"
    - "二重検知の冪等性を既存の処理済み管理・message_id 採番で担保でき、新規の重複排除機構が不要"
    - "fallback_poll_interval を polling_interval と分離したため、pull 型の挙動に影響を与えず低頻度に設定できる"
  negative:
    - "NFS/SMB 環境では取り込みレイテンシが fallback_poll_interval に律速される(イベントが届かないため)"
    - "fsnotify とフォールバックの二重実装を持つため、ウォッチャと走査のコードパス両方をテストする必要がある"
    - "fallback_poll_interval を極端に短くすると共有 FS への負荷が増える(導入先での調整が必要)"
alternatives_considered:
  - name: "fsnotify イベント駆動のみ"
    reason_rejected: "NFS/SMB ではリモート書き込みのイベントが届かず取りこぼす。共有 FS の実体が稼働前に未確定なケースで取り込み漏れが起きるため不採用(REQ-013)"
  - name: "ポーリングのみ(pull 型と同じ polling_interval で受信ディレクトリも走査)"
    reason_rejected: "ローカルディスクでも常にポーリング間隔の遅延が出て、push 受信モードの即時性メリットが失われる。即時性が要件にある(SPEC-013-01)ため不採用"
  - name: "二重検知の冪等性を専用のロックファイル/インデックスで別途管理する"
    reason_rejected: "処理済み管理・message_id 採番という既存の冪等機構で十分に防げる(REQ-013 受け入れ条件)。機構を増やすと整合管理が複雑化するため不採用"
