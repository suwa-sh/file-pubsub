schema_version: "1.0"
artifact_type: "decision_record"
skill_type: "specification"
artifact_id: "spec-decision-008"
title: "message_id の同一秒衝突を連番付与で回避し、marker+copy の残存マーカーは新契機にしない"
status: "approved"
generated_at: "2026-06-17T12:13:32+09:00"
context: |
  外部レビュー(Codex)で、冪等性・履歴保全に関する 2 件のエッジケースが指摘された。
  ① message_id は収集時刻(秒精度)+ Topic + 元ファイル名で採番するため、同一秒に同名ファイルを
     複数回収集すると message_id が衝突し、後勝ちで先行メッセージの Archive・Manifest を上書きして
     履歴を失う。push 受信モード(inbox)の rename/marker は安定待ちなしで即収集するため、短時間の
     同名再 put で同一秒衝突が現実的に到達しうる。SPEC-007-01 が掲げる「履歴を失わない」保証に反する。
  ② 完了検知=marker・残す(copy)では取り込み後もマーカーを残置し処理済み管理で識別する。しかし同名で
     内容の異なる本体を再 put すると、残存する旧マーカー(処理済み)が新本体の完了契機として誤用され、
     Producer が新しいマーカーを置く前に書き込み途中の新本体を取り込むおそれがある。
  論点は、(1)採番をどう一意化するか(サブ秒精度 vs 連番) (2)copy の残存マーカーをどう扱うか、であった。
decision: |
  ① message_id の一意化は「秒精度の形式を維持しつつ、衝突時に連番(_2, _3 …)を付与」する方式とする。
     収集時に既存 Manifest と照合し、衝突する限り連番を進めて未使用の message_id を採番する。
     サブ秒精度に変更しない理由: 秒精度の形式(BDD 例・既存 message_id)を維持でき、クロック分解能に
     依存せず(同一時刻でも)一意性を保証でき、fakeClock を使ったテストでも決定的に検証できるため。
     存在確認(Manifest.Exists)に失敗した場合は、既存メッセージを上書きしないよう次の候補へ進める
     (fail-closed)。探索には上限を設け、上限到達時(継続失敗等の異常時)は最後の候補を返す。
  ② copy の残存マーカーは、既に処理済み管理に記録済みであれば新たな完了契機にしない。本体の readiness を
     「対応マーカーが存在し、かつそのマーカーが未処理」で判定する。これにより同名・内容変更の再 put は、
     Producer が新しい(未処理の)マーカーを置くまで取り込まれない。delete では取り込み後にマーカーを
     削除するため残存マーカー問題は生じず、本対策は copy 固有。処理済み照合に失敗した場合は安全側
     (処理済み扱い = 新たな完了契機にしない)に倒す(fail-closed)。マーカーの新旧判定は処理済み管理の
     識別子(ファイル名 + mtime + サイズ)に依存するため、新しいマーカーは旧マーカーと識別可能であること
     (通常のファイル書き込みで mtime が更新される)を前提とする。
  いずれも「履歴を失わない」(SPEC-007-01)と marker 後始末(SPEC-014-02)の意図を実装で確実に満たすための
  ハードニングで、正常系の挙動・採番形式・後段(Archive / Fan-out / Manifest)は変えない。
consequences:
  positive:
    - "同一秒の同名再収集でも先行メッセージの履歴を上書きせず、SPEC-007-01 の保証を実装で満たす"
    - "秒精度の message_id 形式を維持するため、既存の BDD 例・テスト・運用ツール表示に影響しない"
    - "marker+copy で残存マーカーによる書き込み途中の新本体の早期取り込みを防ぐ"
    - "対策は copy 固有・衝突時のみ作動するため、正常系のオーバーヘッドは最小"
  negative:
    - "採番時に Manifest 存在確認の I/O が 1 回(衝突時は数回)増える"
    - "marker readiness 判定にマーカーの処理済み照合が加わり、copy 時の判定がやや複雑になる"
    - "marker の新旧判定が処理済み識別子(名前 + mtime + サイズ)に依存するため、新しいマーカーが旧マーカーと同一の mtime・サイズ(例: 粗い mtime 分解能で同秒に置かれた空マーカー)になると区別できず、新本体の取り込みが次のマーカー更新まで遅延しうる。通常のファイル書き込みでは mtime が更新されるため実務上は稀"
alternatives_considered:
  - name: "message_id をサブ秒精度(ナノ秒等)に変更する"
    reason_rejected: "BDD 例・既存 message_id の形式が変わり波及が大きい。クロック分解能が粗い環境では同一値衝突が残り、同一時刻のテストも決定的に書けない。連番方式の方が一意性を確実に保証できるため不採用"
  - name: "marker+copy でも取り込み後にマーカーを削除する"
    reason_rejected: "copy(残す)はマーカーを残置し処理済み管理で識別する仕様(SPEC-014-02 / spec-decision-006)に反する。残置したまま処理済み照合で誤用を防ぐ方が仕様整合のため不採用"
