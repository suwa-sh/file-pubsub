# 全体横断仕様サマリー
# GUI を持たないため ux/ui/data-viz は運用者向け CLI/設定/観測 UX として翻案 (_inference.md)
cross_cutting:
  ux_design:
    # user_flows: 運用者ジャーニー3本(導入〜復旧 / 定常運転 / 再送・遡及)
    user_flows: 3
    # ia_pages: IA の翻案 = CLI サブコマンド4つ(serve / status / replay / config validate)
    ia_pages: 4
    # psychology_principles: コマンド UX 原則5つ(フィードフォワード / 冪等性 / 追跡可能性 / スクリプト親和性 / 影響範囲明示)
    psychology_principles: 5
  ui_design:
    # layout_patterns: CLI 出力フォーマット規約4種(status / config validate / replay / serve)
    layout_patterns: 4
    # responsive_breakpoints: GUI なしのためブレイクポイントなし
    responsive_breakpoints: 0
    # component_guidelines: 共通規約4種(CLI 出力 / 終了コード / 設定 YAML 構造 / 構造化ログ)
    component_guidelines: 4
  data_visualization:
    # target_screens: Grafana ダッシュボード設計ガイド1面(サマリー+Topic別ドリルダウンの2階層)
    target_screens: 1
    # chart_types: ステータスパネル / 棒グラフ / テーブル / 折れ線グラフ / エリアチャート
    chart_types: 5
  openapi:
    # api_count: GET /healthz, GET /metrics (観測専用)
    api_count: 2
  asyncapi:
    # async_event_count: AsyncAPI 対象イベントなし(ファイルベース Pub/Sub。asyncapi.yaml は未生成)
    async_event_count: 0

# story_generation: GUI(presentation 系ティア)が存在しないため不要
# (arch-design.yaml の tiers は tier-daemon-worker / tier-ops-cli のみ。design-event.yaml も不在)
story_generation: "not_required"

