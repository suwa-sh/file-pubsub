# _model-summary.yaml
# RDB/KVS は使用しない。永続化はローカルファイルシステムのみ(tables は空、object_storage にパス設計を記述)
uc: "statusコマンドで配送状態を確認する"
business: "配信基盤運用業務"
buc: "配送状況を確認するフロー"

models:
  - name: "StatusArgs"
    tier: "tier-ops-cli"
    layer: "L-cli-command"
    type: "request"
    rdra_info: "Manifest"
  - name: "StatusQuery"
    tier: "tier-daemon-worker"
    layer: "L-daemon-usecase"
    type: "query"
    rdra_info: "Manifest"
  - name: "ManifestEntry"
    tier: "tier-daemon-worker"
    layer: "L-daemon-domain"
    type: "entity"
    rdra_info: "Manifest"
  - name: "ManifestRecord"
    tier: "tier-daemon-worker"
    layer: "L-daemon-gateway"
    type: "record"
    rdra_info: "Manifest"
  - name: "DeliveryStatusTable"
    tier: "tier-ops-cli"
    layer: "L-cli-command"
    type: "view-model"
    rdra_info: "Manifest"
  - name: "DeliveryStatusSummary"
    tier: "tier-ops-cli"
    layer: "L-cli-command"
    type: "view-model"
    rdra_info: "Manifest"

tables: []

kvs: []

object_storage:
  - path_pattern: "manifest/{message_id}.json"
    purpose: "配送状態照会(message_id・topic・Subscription 別の delivered / failed / dlq、リトライ回数、配送日時、再送(Replay)記録の読取)"
    content_type: "application/json"
    operations: ["GET"]
    max_size: "1MB"
