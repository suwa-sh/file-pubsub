# _model-summary.yaml
# データストアは RDB/KVS を使わない(全永続化はローカルファイルシステム)。
# ファイルレイアウトは object_storage セクションでパス設計として表現する(datastore-rules.md)。
uc: "ファイルを収集する(Collect)"
business: "ファイル配信業務"
buc: "ファイルを収集して配信するフロー"

models:
  - name: "CollectCycleCommand"
    tier: "tier-daemon-worker"
    layer: "usecase"
    type: "command"
    rdra_info: "収集ソース"
  - name: "InboxIngestCommand"
    tier: "tier-daemon-worker"
    layer: "usecase"
    type: "command"
    rdra_info: "収集ソース"
  - name: "SourceFileCandidate"
    tier: "tier-daemon-worker"
    layer: "domain"
    type: "value-object"
    rdra_info: "収集ソース"
  - name: "StabilityCheckRule"
    tier: "tier-daemon-worker"
    layer: "domain"
    type: "value-object"
    rdra_info: "収集ソース"
  - name: "CompletionDetectionRule"
    tier: "tier-daemon-worker"
    layer: "domain"
    type: "value-object"
    rdra_info: "収集ソース"
  - name: "MessageIdRule"
    tier: "tier-daemon-worker"
    layer: "domain"
    type: "value-object"
    rdra_info: "メッセージ"
  - name: "Message"
    tier: "tier-daemon-worker"
    layer: "domain"
    type: "entity"
    rdra_info: "メッセージ"
  - name: "SourceConnector"
    tier: "tier-daemon-worker"
    layer: "gateway"
    type: "record"
    rdra_info: "収集ソース"
  - name: "InboxConnector"
    tier: "tier-daemon-worker"
    layer: "gateway"
    type: "record"
    rdra_info: "収集ソース"
  - name: "CollectedFileRecord"
    tier: "tier-daemon-worker"
    layer: "gateway"
    type: "record"
    rdra_info: "メッセージ"
  - name: "ManifestRecord"
    tier: "tier-daemon-worker"
    layer: "gateway"
    type: "record"
    rdra_info: "Manifest"
  - name: "ProcessedRecord"
    tier: "tier-daemon-worker"
    layer: "gateway"
    type: "record"
    rdra_info: "処理済み管理"

# RDB は使用しない
tables: []

kvs: []

object_storage:
  - path_pattern: "work/collect/{topic}/{message_id}"
    purpose: "収集済みファイルの一時保管(一時名 {message_id}.tmp で書き込み後 rename。後続の Archive 保存の入力)。pull 型・push 受信モード(inbox)とも同一"
    content_type: "application/octet-stream"
    operations: ["PUT", "GET"]
    max_size: "500MB"
  - path_pattern: "manifest/{message_id}.json"
    purpose: "メッセージ配送管理レコードの新規作成(status=収集済。message_id / topic / 元ファイル名 / 収集時刻 / retry_count=0)"
    content_type: "application/json"
    operations: ["PUT"]
    max_size: "1MB"
  - path_pattern: "processed/{topic}.json"
    purpose: "処理済み管理(copy 設定時の重複収集防止 + push 受信モードの二重検知/done マーカー残置時の重複取り込み防止。収集元ファイル識別子(done マーカー名含む) + 処理済み判定日時を追記)"
    content_type: "application/json"
    operations: ["GET", "PUT"]
    max_size: "10MB"
  - path_pattern: "{source.directory}/{original_file_name}"
    purpose: "push 受信モード(inbox)の収集元。Producer が直接 put する受信ディレクトリ(設定 source.directory を pull 型と共通流用)上のファイル。file-pubsub が fsnotify イベント駆動 + フォールバックポーリングで取り込み(GET)、回収時は削除(DELETE)。受信ディレクトリは file-pubsub がアクセスできる共有/ローカル FS"
    content_type: "application/octet-stream"
    operations: ["GET", "DELETE"]
    max_size: "500MB"
  - path_pattern: "{source.directory}/{original_file_name}.done"
    purpose: "push 受信モード・完了検知方式=marker(source.completion=marker)時の完了マーカー。xxx.done の出現で xxx を取り込み対象にする。マーカー名は xxx.done 固定。マーカー自体は配信対象外。回収時は削除、残す(copy)時は処理済み管理で識別(マーカー後始末)"
    content_type: "application/octet-stream"
    operations: ["GET", "DELETE"]
    max_size: "4KB"
  - path_pattern: "config.yaml"
    purpose: "収集ソース定義(source.type=inbox・受信ディレクトリ source.directory 流用・完了検知方式 source.completion・フォールバック間隔 source.fallback_poll_interval)・認証情報参照・ポーリング間隔の読込"
    content_type: "application/yaml"
    operations: ["GET"]
    max_size: "1MB"
