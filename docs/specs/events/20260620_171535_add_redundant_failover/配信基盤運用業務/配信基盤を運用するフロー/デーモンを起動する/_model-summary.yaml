uc: "デーモンを起動する"
business: "配信基盤運用業務"
buc: "配信基盤を運用するフロー"

models:
  - name: "ServeCommand(serve サブコマンド引数)"
    tier: "tier-ops-cli"
    layer: "command"
    type: "command"
    rdra_info: ""
  - name: "StartupSequence(起動シーケンス)"
    tier: "tier-daemon-worker"
    layer: "runtime"
    type: "state"
    rdra_info: ""
  - name: "Config(設定)"
    tier: "tier-daemon-worker"
    layer: "domain"
    type: "entity"
    rdra_info: "設定"
  - name: "Lock"
    tier: "tier-daemon-worker"
    layer: "domain"
    type: "entity"
    rdra_info: "Lock"
  - name: "LockFileStore(lock ファイル読み書き)"
    tier: "tier-daemon-worker"
    layer: "gateway"
    type: "record"
    rdra_info: "Lock"

tables: []

kvs: []

object_storage:
  - path_pattern: "config.yaml"
    purpose: "--config で指定する単一YAML設定ファイル。起動時の設定読込・検証(ポーリング間隔 / metrics_port / 唯一性保証方式 / lease TTL / heartbeat 間隔 / Topic・Subscription定義)"
    content_type: "application/yaml"
    operations: ["GET"]
    max_size: "1MB"
  - path_pattern: "lock"
    purpose: "データディレクトリ直下の lock ファイル(lease レコード)。二重起動防止(single-writer)。hostname + boot-id + acquired_at + renewed_at + ttl + generation を記録し、renewed_at + ttl 超過で stale 判定する(PID 生存確認に依存しない、SPEC-015-01)。heartbeat は所有者検証 + generation CAS で TOCTOU を検出する(spec-decision-009)"
    content_type: "text/plain"
    operations: ["GET", "PUT"]
    max_size: "4KB"
