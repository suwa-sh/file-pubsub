version: "1.0"
event_id: "20260620_171535_add_redundant_failover"
created_at: "2026-06-20T08:17:22"
source: "docs/usdm/events/20260620_171535_add_redundant_failover/source.txt"
system_name: "file-pubsub"

requirements:
  - id: "REQ-015"
    requirement: "VIP + NFS で同一 data_dir を共有する複数ホスト構成で、ファイル操作を行う serve プロセスを常に1つだけにしたまま、active/standby の自動フェイルオーバーに対応したい"
    reason: "現状は単一インスタンス前提(HAなし)で、サーバ障害時は再起動による復旧しかできず可用性が不足する。Consumer 更改での並行稼働を支える配信基盤がサーバ障害で止まると業務影響が大きい。VIP で束ねた複数ホストと NFS 共有 data_dir を用いれば、single-writer(serve は常に1つ)を維持したまま active/standby で冗長化し、障害時に standby が自動昇格して配信を継続できる"
    priority: "must"
    specifications:
      - id: "SPEC-015-01"
        specification: "lock を lease レコード化する。lease は hostname + boot-id + acquired_at + renewed_at + ttl を持ち、active な serve が heartbeat で renewed_at を定期更新する。現状の PID 生存確認(os.FindProcess + Signal(0))による stale 判定はマルチホストで他ホストの PID を判定できず破綻するため、lease の renewed_at + ttl 超過による stale 判定へ置換する"
        acceptance_criteria:
          - "Given lease 方式の設定 When active な serve が稼働中 Then heartbeat 間隔ごとに lease の renewed_at が更新される"
          - "Given 別ホストで稼働していた active が renewed_at を ttl を超えて更新していない When standby が lease を確認する Then その lease は stale と判定される(PID 生存確認には依存しない)"
          - "Given lease に hostname + boot-id + acquired_at + renewed_at + ttl が記録されている When lease レコードを参照する Then どのホスト・どの起動世代が active かを識別できる"
        affected_models:
          - type: "information"
            action: "modify"
            target: "Lock"
          - type: "state"
            action: "modify"
            target: "Lock状態"
          - type: "condition"
            action: "modify"
            target: "二重起動防止"
      - id: "SPEC-015-02"
        specification: "唯一性の保証方式を設定で切り替え・併用できる。方式B(lease 自動奪取: file-pubsub 単体で TTL 失効により standby が自動昇格)と、方式A(外部クラスタ委譲: Pacemaker/keepalived 等の fencing が唯一性を保証し、VIP と serve を同一リソースグループで束ねる)を選択でき、同一バイナリで両環境をカバーする"
        acceptance_criteria:
          - "Given 方式B(lease 自動奪取)の設定 When active の lease が ttl 失効する Then standby が lease を奪取して active へ自動昇格し配信を継続する"
          - "Given 方式A(外部クラスタ委譲)の設定 When 外部クラスタ(Pacemaker/keepalived 等)が serve リソースを起動/停止する Then file-pubsub は TTL 失効による自動奪取を行わず、外部クラスタの fencing による唯一性保証に委ねる"
          - "Given 同一バイナリ When 方式A と方式B のいずれの設定でも起動する Then どちらの冗長構成でも動作する"
        affected_models:
          - type: "variation"
            action: "add"
            target: "唯一性保証方式"
          - type: "information"
            action: "modify"
            target: "設定"
          - type: "external_system"
            action: "add"
            target: "外部クラスタ"
      - id: "SPEC-015-03"
        specification: "lease 方式では heartbeat で lease を更新し、standby は lease の ttl 失効を検知して昇格する。デーモン稼働状態に standby(lease 待機)を含め、active への昇格・active からの降格(lease 喪失/停止)を遷移として扱う"
        acceptance_criteria:
          - "Given lease を保持できない2台目以降の serve When 起動する Then standby として lease の ttl 失効を待機する(二重 serve を起こさない)"
          - "Given standby が active の lease 失効を検知した When lease を奪取する Then standby から active へ昇格し収集・配信サイクルを開始する"
          - "Given active が lease を更新できなくなった(NFS 断・プロセス停止等) When ttl を超過する Then その serve は active を継続せず、他ノードの昇格を妨げない"
        affected_models:
          - type: "state"
            action: "modify"
            target: "デーモン稼働状態"
          - type: "state"
            action: "modify"
            target: "Lock状態"
          - type: "buc"
            action: "modify"
            target: "デーモンを起動する"

  - id: "REQ-016"
    requirement: "lease 方式の split-brain による被害を、データ破損・喪失なく「高々1メッセージの重複配信」に限定したい"
    reason: "lease 方式では active の lease 失効判定と新 active の昇格の間に、旧 active がまだ動いている split-brain の窓が原理的に残る。この窓を運用上許容するには、被害がデータ破損・喪失に至らず、既存の at-least-once 許容範囲(高々1メッセージの重複配信)に収まることを保証する必要がある"
    priority: "must"
    specifications:
      - id: "SPEC-016-01"
        specification: "split-brain の窓で2つの serve が一時的に同じ data_dir を操作しても、AtomicWrite 配置 + at-least-once 冪等再開(resumeArchiving)+ Manifest/処理済み照合の fail-closed 冪等により、被害を高々1メッセージの重複配信に限定し、データ破損・喪失は起こさない"
        acceptance_criteria:
          - "Given split-brain の窓で2つの serve が同一 data_dir を操作する When Subscription へ配置する Then AtomicWrite(一時名→rename)により正式名のファイルは常に完全な内容で、途中状態は露出しない"
          - "Given split-brain 中に一方が中断・再開する When resumeArchiving が走る Then at-least-once の冪等再開により未配信のみ配置され、データの喪失は起きない(重複は高々1メッセージ)"
          - "Given 冪等照合(Manifest/処理済み)の I/O が失敗した When 取り込み/配置を判断する Then fail-closed で安全側に倒し(衝突なし/未処理と誤って楽観視しない)、既存メッセージの上書きを避ける"
        affected_models:
          - type: "condition"
            action: "modify"
            target: "AtomicWrite配置"
          - type: "condition"
            action: "modify"
            target: "二重配信防止"
          - type: "condition"
            action: "modify"
            target: "message_id採番"
          - type: "buc"
            action: "modify"
            target: "冪等に処理を再開する"

  - id: "REQ-017"
    requirement: "lease 方式が前提とする共有 FS・時刻同期・TTL 設定の制約を明示し、設定で安全側に運用できるようにしたい"
    reason: "lease/TTL 判定は時刻と NFS の属性キャッシュ挙動に依存する。前提(NFSv4 推奨・NTP 時刻同期・lease TTL を属性キャッシュ最大より十分大きく取る)を満たさないと唯一性が崩れるため、制約を明示し設定で安全側に倒せる必要がある"
    priority: "must"
    specifications:
      - id: "SPEC-017-01"
        specification: "lease 方式は NFSv4(O_CREATE|O_EXCL の原子性)を推奨し、NTP による時刻同期を前提とする。lease TTL は NFS の属性キャッシュ(actimeo、既定最大60s)より十分大きく設定でき、既定値も属性キャッシュより大きく取る。pull型(sftp/ftp/local)は active/standby のどちらが引いても同一ソースを引き、VIP 無関係で lease 保持者(active)だけが pull/archive する"
        acceptance_criteria:
          - "Given NFSv4 + NTP 同期環境 When lease TTL を属性キャッシュ最大(actimeo 既定60s)より十分大きく設定する Then lease の renewed_at がキャッシュ遅延で誤って stale 判定されない"
          - "Given lease TTL を省略 When 設定を読み込む Then 既定 TTL は属性キャッシュ最大より十分大きい値として扱われる"
          - "Given active/standby の複数ホスト When lease 保持者(active)だけが pull/archive する Then standby は lease を保持するまで pull/archive せず、二重収集しない"
        affected_models:
          - type: "information"
            action: "modify"
            target: "設定"
          - type: "external_system"
            action: "modify"
            target: "リモートファイル領域"
      - id: "SPEC-017-02"
        specification: "方式A(外部クラスタ委譲)では VIP と serve を同一リソースグループで束ねる。push(put)受信モードでは「serve が居ないノードに VIP が付く」窓に注意する運用を前提とし(fsnotify は NFS で効かないためフォールバックポーリング前提、これは対応済み)、受信ディレクトリ取り込みは active な serve(VIP と同居)で行う"
        acceptance_criteria:
          - "Given 方式A で VIP と serve を同一リソースグループで束ねた構成 When フェイルオーバーが起きる Then VIP と serve が同じノードへ移動し、serve の居ないノードへ VIP だけが付く窓を最小化する"
          - "Given push 受信モードかつ NFS 上の受信ディレクトリ When active な serve が取り込む Then fsnotify ではなくフォールバックポーリングで確実に取り込む(fsnotify は NFS で効かない)"
        affected_models:
          - type: "external_system"
            action: "modify"
            target: "外部クラスタ"
          - type: "external_system"
            action: "modify"
            target: "受信ディレクトリ"
          - type: "information"
            action: "modify"
            target: "設定"

  - id: "REQ-018"
    requirement: "アーキテクチャと非機能要求の単一インスタンス前提(HAなし)を、active/standby 冗長化ありへ見直したい"
    reason: "本変更により単一インスタンス前提が成立しなくなる。アーキの設計判断(CTP-006 単一インスタンス前提)と NFR の可用性グレード(A.2.1.1 サーバ内冗長化 Lv1: 冗長化なし、再起動で復旧)を、active/standby 冗長化ありに整合させないと仕様と実態が乖離する"
    priority: "should"
    specifications:
      - id: "SPEC-018-01"
        specification: "アーキテクチャの単一インスタンス前提(HAなし)の設計判断を見直し、active/standby 冗長化(lease 方式 / 外部クラスタ委譲)を前提に再定義する。NFR の可用性(サーバ内冗長化)を「冗長化なし・再起動で復旧」から「active/standby 冗長化あり・自動フェイルオーバー」へ引き上げる"
        acceptance_criteria:
          - "Given 単一インスタンス前提の設計判断(HAなし) When 本変更を反映する Then active/standby 冗長化を前提とした設計判断へ更新される"
          - "Given NFR の可用性が冗長化なし(再起動で復旧)である When 本変更を反映する Then active/standby 冗長化ありの自動フェイルオーバーへ引き上げられる"
        affected_models:
          - type: "business_policy"
            action: "add"
            target: "冗長構成方針"
