version: "1.0"
event_id: "20260617_014653_add_push_receive_mode"
created_at: "2026-06-17T01:46:53"
source: "GitHub Issue #11 変更要望: Producer push(put)型の受信モードに対応したい"
system_name: "file-pubsub"

requirements:
  - id: "REQ-012"
    requirement: "既存の pull 型収集を維持したまま、Producer が file-pubsub のアクセスできる受信ディレクトリへ直接 put したファイルを取り込む push(put)受信モードを追加したい"
    reason: "現状は pull 型のみで、file-pubsub が polling_interval ごとにリモート領域(FTP/SFTP/SCP/local)を List → Fetch → Delete で取りに行く。Producer によっては file-pubsub が共有/ローカルディレクトリへ直接出力する受け口の方が自然で、リモート領域への中継を挟まずに連携できる。pull 型を使う既存現場もあるため両方を残し、Producer 無改修の前提も維持する"
    priority: "must"
    specifications:
      - id: "SPEC-012-01"
        specification: "収集ソース種別に push(put)受信モードを追加し、Topic ごとに既存 pull 型(FTP/SFTP/SCP/ローカルディレクトリの List → Fetch → Delete)と排他で選択できる。push 受信モードの受け口は file-pubsub がアクセスできる共有/ローカルの受信ディレクトリで、Producer がそこへファイルを put する。後段(Archive / Fan-out / Manifest / Retry / Retention)はソース種別に依存せず既存処理をそのまま流用する"
        acceptance_criteria:
          - "Given Topic の収集ソースが push 受信モード(受信ディレクトリ指定)に設定されている When Producer が受信ディレクトリへファイルを put する Then ファイルが取り込まれ Archive へ保存され Fan-out される"
          - "Given 既存 Topic が pull 型(FTP/SFTP/SCP/local)に設定されている When push 受信モードの Topic を別途追加する Then 既存 pull 型 Topic の収集・配信は変更なく動作し、両モードが同一デーモンで併存する"
          - "Given push 受信モードで取り込まれたメッセージ When Archive / Fan-out / Manifest / Retry / Retention の各処理を確認する Then pull 型と同一の後段処理が適用される"
        affected_models:
          - type: "variation"
            action: "modify"
            target: "収集ソース種別"
          - type: "external_system"
            action: "add"
            target: "受信ディレクトリ"
          - type: "external_system"
            action: "modify"
            target: "Producerシステム"
          - type: "information"
            action: "modify"
            target: "収集ソース"
          - type: "information"
            action: "modify"
            target: "設定"
          - type: "buc"
            action: "modify"
            target: "ファイルを収集する(Collect)"
      - id: "SPEC-012-02"
        specification: "push 受信モードでの取り込み後の元ファイル処理は、既存の元ファイル処理方式(回収=delete / 残す=copy)を流用するが、対象が受信ディレクトリのファイルに変わる。回収では file-pubsub が受信ディレクトリのファイルを削除し、残す(copy)では受信ディレクトリに残したまま処理済み管理で重複取り込みを防ぐ"
        acceptance_criteria:
          - "Given push 受信モード・回収(delete)設定の Topic When 取り込みが完了する Then 受信ディレクトリから該当ファイルが削除される"
          - "Given push 受信モード・残す(copy)設定の Topic When 同じファイルが受信ディレクトリに残ったまま次の取り込み契機が来る Then 処理済み管理により再取り込みされない"
        affected_models:
          - type: "variation"
            action: "modify"
            target: "元ファイル処理方式"
          - type: "condition"
            action: "modify"
            target: "元ファイル処理判定"
          - type: "information"
            action: "modify"
            target: "処理済み管理"
          - type: "state"
            action: "modify"
            target: "元ファイル収集状態"

  - id: "REQ-013"
    requirement: "push 受信モードの取り込み契機を、イベント駆動とフォールバックポーリングのハイブリッドにしたい"
    reason: "受信ディレクトリの共有 FS 実体は環境により異なり(ローカルディスク / NFS / SMB)、稼働時には未確定なこともある。ローカルディスクなら fsnotify によるイベント駆動で即時反応できるが、NFS/SMB では fsnotify のイベントを取りこぼすため、低頻度のフォールバックポーリングで確実に拾う必要がある。両対応により共有 FS の実体に依存せず取り込みできる"
    priority: "must"
    specifications:
      - id: "SPEC-013-01"
        specification: "push 受信モードでは fsnotify による受信ディレクトリのイベント駆動監視で、ファイル出現を即時に取り込み契機とする。共有 FS がローカルディスクの場合は即時反応する"
        acceptance_criteria:
          - "Given push 受信モードでローカルディスクの受信ディレクトリを監視中 When Producer がファイルを put する Then ポーリング間隔を待たずに(イベント駆動で)取り込みが開始される"
        affected_models:
          - type: "variation"
            action: "add"
            target: "取り込みトリガー方式"
          - type: "information"
            action: "modify"
            target: "収集ソース"
          - type: "buc"
            action: "modify"
            target: "ファイルを収集する(Collect)"
      - id: "SPEC-013-02"
        specification: "fsnotify のイベントを取りこぼす環境(NFS/SMB 等)に備え、低頻度のフォールバックポーリングを併用する。イベント駆動で拾えなかったファイルもフォールバックポーリングで取り込まれる"
        acceptance_criteria:
          - "Given push 受信モードで fsnotify がイベントを通知しない共有 FS(NFS/SMB)上の受信ディレクトリ When Producer がファイルを put する Then フォールバックポーリングの周期内に該当ファイルが取り込まれる"
          - "Given イベント駆動とフォールバックポーリングの両方が同一ファイルを検知しうる状況 When 取り込みが実行される Then 同一ファイルは二重取り込みされない(処理済み管理・message_id 採番で冪等)"
        affected_models:
          - type: "variation"
            action: "add"
            target: "取り込みトリガー方式"
          - type: "information"
            action: "modify"
            target: "設定"
          - type: "condition"
            action: "modify"
            target: "message_id採番"

  - id: "REQ-014"
    requirement: "push 受信モードで、Producer の出力パターンに応じて書き込み完了の検知方式を設定で選べるようにしたい"
    reason: "受信ディレクトリへ put される際の書き込み完了の表し方は Producer により異なる。サイズ・mtime が安定するもの、一時名から正式名へ rename するもの、完了マーカー(.done)を別途置くものがある。Producer 無改修の前提で確実に完成ファイルだけを取り込むには、出力パターンに合わせて完了検知方式を選択できる必要がある"
    priority: "must"
    specifications:
      - id: "SPEC-014-01"
        specification: "完了検知方式を収集ソース設定で選択できる: (a)安定判定(既存 stability_check: サイズ・mtime の安定待ち) (b)rename 方式(xxx.csv.tmp → xxx.csv の正式名出現で取り込み) (c)done マーカー方式(xxx.done が置かれたら xxx を取り込み対象にする)。選択した方式で書き込み完了と判定したファイルのみを取り込む"
        acceptance_criteria:
          - "Given 完了検知=安定判定 の push 受信モード When Producer が受信ディレクトリへ書き込み中 Then サイズ・mtime が安定するまで取り込まれず、安定後に取り込まれる"
          - "Given 完了検知=rename 方式 の push 受信モード When Producer が xxx.csv.tmp で書き込み後 xxx.csv へ rename する Then 正式名 xxx.csv の出現を契機に取り込まれ、.tmp は取り込み対象としない"
          - "Given 完了検知=done マーカー方式 の push 受信モード When Producer が xxx を置いた後に xxx.done を置く Then xxx.done の出現を契機に xxx が取り込み対象になり、xxx.done 自体は配信対象としない"
        affected_models:
          - type: "condition"
            action: "modify"
            target: "書き込み完了判定"
          - type: "variation"
            action: "add"
            target: "完了検知方式"
          - type: "information"
            action: "modify"
            target: "収集ソース"
          - type: "state"
            action: "modify"
            target: "元ファイル収集状態"
      - id: "SPEC-014-02"
        specification: "done マーカー方式では、対象ファイルの取り込み後にマーカーファイル(xxx.done)の後始末を行う。元ファイル処理方式(回収=delete / 残す=copy)に整合し、回収時はマーカーも削除し、残す時はマーカーを処理済み管理で識別して重複契機を防ぐ"
        acceptance_criteria:
          - "Given 完了検知=done マーカー・回収(delete)設定 When xxx を取り込む Then xxx と xxx.done の双方が受信ディレクトリから削除される"
          - "Given 完了検知=done マーカー・残す(copy)設定 When 同じ xxx.done が残ったまま次の契機が来る Then 処理済み管理により xxx が再取り込みされない"
        affected_models:
          - type: "condition"
            action: "modify"
            target: "元ファイル処理判定"
          - type: "information"
            action: "modify"
            target: "処理済み管理"
          - type: "state"
            action: "modify"
            target: "元ファイル収集状態"
