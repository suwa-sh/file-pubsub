version: "1.0"
event_id: "20260620_171535_add_redundant_failover"
created_at: "2026-06-20T08:17:22"
source: "冗長構成(active/standby 自動フェイルオーバー)対応: lock の lease レコード化(SPEC-015-01)、唯一性保証方式の方式A(外部クラスタ委譲/fencing)・方式B(lease 自動奪取)切替併用(SPEC-015-02)、split-brain 被害の高々1メッセージ重複限定(SPEC-016-01)、NFS/NTP/TTL 制約の明示(SPEC-017)、単一インスタンス前提(HAなし)の見直し(SPEC-018-01) (初期構築 20260612_150425 → push 受信モード追加 20260617_014653 → completion ネスト化 20260617_081425 → idempotency ハードニング 20260617_121332 → 本差分の累積スナップショット)"
system_name: "file-pubsub"

requirements:
  - id: "REQ-001"
    requirement: "FTP GET/DELETE 型のレガシーファイル IF を、Producer を変更せずに複数 Consumer へ同報配信できる Pub/Sub 風の配信モデルへ変換したい"
    reason: "Consumer 側システムの更改で Current/Next の並行稼働が必要だが、FTP GET+DELETE 方式は先に取得した Consumer がファイルを削除するため並行稼働できない。他のファイル IF はファイル転送基盤で同報配信できており、FTP GET 型だけが例外。Producer は変更したくない"
    priority: "must"
    specifications:
      - id: "SPEC-001-01"
        specification: "Topic(Producer から出力される論理的なファイル種別。例: orders / customers / invoices)と Subscription(Consumer ごとの配送先。例: current / next / test)の 2 概念で配信構成を単一 YAML 設定で定義できる"
        acceptance_criteria:
          - "Given 設定 YAML に Topic と複数の Subscription が定義されている When 構成を読み込む Then Topic ごとに Subscription の一覧が解決される"
          - "Given Subscription を追加する設定変更 When 構成を再読み込みする Then Producer 側の変更なしに新しい配送先が増える"
        affected_models:
          - type: "information"
            action: "add"
            target: "Topic"
          - type: "information"
            action: "add"
            target: "Subscription"
          - type: "information"
            action: "add"
            target: "設定"
          - type: "external_system"
            action: "add"
            target: "Producerシステム"
      - id: "SPEC-001-02"
        specification: "Archive に保存したファイルを Subscription ごとのローカルディレクトリ(subscriptions/current, subscriptions/next 等)へ複製する(Fan-out)。配信先は file-pubsub 稼働サーバ上のローカルディレクトリのみで、Consumer が従来手段(FTP GET 等)で取りに来る"
        acceptance_criteria:
          - "Given Topic に新しいファイルが収集された When Fan-out が実行される Then 全 Subscription のディレクトリに同一内容のファイルが配置される"
          - "Given Current と Next の 2 つの Subscription When 一方がファイルを取り込んで削除する Then 他方の Subscription のファイルには影響しない"
        affected_models:
          - type: "buc"
            action: "add"
            target: "ファイルを収集して配信する"
          - type: "external_system"
            action: "add"
            target: "Consumerシステム(Current)"
          - type: "external_system"
            action: "add"
            target: "Consumerシステム(Next)"
      - id: "SPEC-001-03"
        specification: "Subscription ごとに配送が独立しており、Consumer の取り込みタイミングの差(即時取り込み / 夜間バッチ等)を吸収できる。メッセージの順序保証はせず、Fan-out 配置はファイル名昇順で処理する(取り込み順序は Consumer の責任)"
        acceptance_criteria:
          - "Given Current が即時取り込み・DWH が夜間取り込み When それぞれが自分のペースでファイルを取得・削除する Then 互いの配送に影響しない"
        affected_models:
          - type: "variation"
            action: "add"
            target: "Consumer取り込みタイミング"

  - id: "REQ-002"
    requirement: "Producer が出力するファイルを、リモートサーバ(FTP / SFTP / SCP)およびローカルディレクトリから収集(Collect)したい"
    reason: "実際のレガシー IF は Producer が FTP 領域へ出力する方式であり、リモート収集が本来の収集要件。プロトコルは現場により FTP / SFTP / SCP が混在する。収集と後段(Archive / Fan-out / Manifest)を分離し、後段をソース種別に依存させないことで構成の自由度を保つ"
    priority: "must"
    specifications:
      - id: "SPEC-002-01"
        specification: "収集ソースを Topic ごとに設定で切り替えられる(FTP / SFTP / SCP / ローカルディレクトリ)。後段(Archive / Fan-out / Manifest)はソース種別に依存しない"
        acceptance_criteria:
          - "Given Topic の収集ソースが FTP 領域に設定されている When Collect が実行される Then ファイルが取得され Archive へ保存される"
          - "Given 収集ソース種別を ftp から sftp へ設定変更する When Collect を実行する Then 後段(Archive / Fan-out / Manifest)は変更なしに動作する"
        affected_models:
          - type: "variation"
            action: "add"
            target: "収集ソース種別"
          - type: "external_system"
            action: "add"
            target: "リモートファイル領域"
      - id: "SPEC-002-02"
        specification: "収集後の元ファイルは GET 後 DELETE(回収)が既定。Topic 設定で「残す(copy)」も選択でき、copy 時は処理済み管理で同じファイルの重複収集を防ぐ"
        acceptance_criteria:
          - "Given 既定設定の Topic When Collect が完了する Then 収集元からファイルが削除されている"
          - "Given copy 設定の Topic When 同じファイルが残ったまま次の Collect が実行される Then 処理済みのファイルは再収集されない"
        affected_models:
          - type: "variation"
            action: "add"
            target: "元ファイル処理方式"
          - type: "information"
            action: "add"
            target: "処理済み管理"
      - id: "SPEC-002-03"
        specification: "Producer が書き込み中のファイルを収集しない(サイズ/更新時刻の安定待ち、除外パターン)。リモート GET 中も一時名でダウンロードし完了後 rename して、Archive に途中状態を残さない"
        acceptance_criteria:
          - "Given Producer がファイルを書き込み中 When Collect が実行される Then 該当ファイルは収集されず次回以降に持ち越される"
          - "Given リモート GET が中断された When Archive を参照する Then 途中状態のファイルは存在しない"
        affected_models:
          - type: "condition"
            action: "add"
            target: "書き込み完了判定"

  - id: "REQ-003"
    requirement: "ポーリング間隔を設定できる常駐デーモンとして安全に動作させたい"
    reason: "Producer はニアリアルタイムでファイルを出力し続けるため、定期的な収集・配信の自動実行が必要。単一インスタンス前提のため二重起動の防止と、停止時のデータ保全が運用上不可欠"
    priority: "must"
    specifications:
      - id: "SPEC-003-01"
        specification: "ポーリング間隔を設定できる常駐プロセスとして動作する"
        acceptance_criteria:
          - "Given ポーリング間隔が設定されている When デーモンを起動する Then 設定間隔で収集・配信サイクルが繰り返される"
        affected_models:
          - type: "buc"
            action: "add"
            target: "配信基盤を運用する"
          - type: "actor"
            action: "add"
            target: "運用者"
      - id: "SPEC-003-02"
        specification: "二重起動を Lock で防止し、異常終了後の stale lock からは安全に回復する"
        acceptance_criteria:
          - "Given デーモンが実行中 When 同じ構成で 2 つ目のデーモンを起動する Then 2 つ目は起動せず終了する"
          - "Given 異常終了で残った stale lock When デーモンを起動する Then 安全に回復して処理を開始できる"
        affected_models:
          - type: "information"
            action: "add"
            target: "Lock"
          - type: "condition"
            action: "add"
            target: "二重起動防止"
      - id: "SPEC-003-03"
        specification: "graceful shutdown(停止指示を受けたら処理中メッセージを完了してから停止する)"
        acceptance_criteria:
          - "Given メッセージ処理中 When 停止シグナルを受ける Then 処理中のメッセージを完了してから停止し、中途半端な状態を残さない"
        affected_models:
          - type: "state"
            action: "add"
            target: "デーモン稼働状態"

  - id: "REQ-004"
    requirement: "収集したファイルを必ず Archive に保存したい"
    reason: "再送・監査・障害復旧・差分比較の基盤になる。GET/DELETE 方式ではファイルが消えてしまい、これらが一切できない"
    priority: "must"
    specifications:
      - id: "SPEC-004-01"
        specification: "収集したファイルを配信前に必ず archive/ 配下へ Topic 別に保存する"
        acceptance_criteria:
          - "Given ファイルが収集された When Fan-out の前後いずれの時点でも Then archive/ 配下に元ファイルが Topic 別に残っている"
          - "Given Fan-out が失敗した When 処理を確認する Then Archive には保存済みで、再実行で配信を回復できる"
        affected_models:
          - type: "information"
            action: "add"
            target: "Archiveファイル"
          - type: "state"
            action: "add"
            target: "メッセージ配送状態"
      - id: "SPEC-004-02"
        specification: "Archive の保持期間を設定でき、超過分を安全に削除する(無限に溜めない)"
        acceptance_criteria:
          - "Given 保持期間が設定されている When retention 処理が実行される Then 期間を超過した Archive ファイルだけが削除される"
        affected_models:
          - type: "condition"
            action: "add"
            target: "Archive保持期間"

  - id: "REQ-005"
    requirement: "Consumer が書き込み途中のファイルを読まないようにしたい"
    reason: "Consumer は任意のタイミングでファイルを取得するため、途中状態のファイルを読むと取り込みデータが破損する"
    priority: "must"
    specifications:
      - id: "SPEC-005-01"
        specification: "Subscription ディレクトリへの配置は一時名(file.csv.tmp)で書き込んでから正式名(file.csv)へ rename する Atomic Write 方式とする"
        acceptance_criteria:
          - "Given Fan-out で配置中のファイル When Consumer が Subscription ディレクトリを参照する Then 正式名のファイルは常に完全な内容である"
        affected_models:
          - type: "condition"
            action: "add"
            target: "AtomicWrite配置"

  - id: "REQ-006"
    requirement: "どのファイルをどの Subscription へ配送したかの履歴(Manifest)を管理し、配送状況を確認できるようにしたい"
    reason: "配送の成否を Subscription 単位で追跡できないと、並行稼働中の障害調査・再送判断・監査ができない"
    priority: "must"
    specifications:
      - id: "SPEC-006-01"
        specification: "メッセージ(収集ファイル)ごとに message_id / topic / 各 Subscription の配送状態(delivered / failed / dlq)を Manifest として記録する"
        acceptance_criteria:
          - "Given ファイルが収集・配信された When Manifest を参照する Then message_id・topic・各 Subscription の配送状態が確認できる"
          - "Given 一部の Subscription への配信が失敗した When Manifest を参照する Then 失敗した Subscription が特定できる"
        affected_models:
          - type: "information"
            action: "add"
            target: "Manifest"
          - type: "state"
            action: "modify"
            target: "メッセージ配送状態"
      - id: "SPEC-006-02"
        specification: "配送状況を確認する status コマンドを提供する"
        acceptance_criteria:
          - "Given 配送履歴が存在する When status コマンドを実行する Then topic / Subscription 別の配送状態が確認できる"
        affected_models:
          - type: "buc"
            action: "add"
            target: "配送状況を確認する"

  - id: "REQ-007"
    requirement: "再起動・再実行しても二重配信しない冪等な処理にしたい"
    reason: "常駐デーモンは障害・メンテナンスでの再起動が前提。再開のたびに二重配信や履歴消失が起きると並行稼働の信頼性が成り立たない"
    priority: "must"
    specifications:
      - id: "SPEC-007-01"
        specification: "同名ファイルの再出力は新しいメッセージとして扱う(上書きで履歴を失わない)。message_id は収集時刻 + Topic + 元ファイル名から採番し、同一収集秒に同名ファイルを複数回収集した場合も連番付与で一意化して既存メッセージの Archive・Manifest を上書きしない"
        acceptance_criteria:
          - "Given 同名ファイルが再度出力された When Collect が実行される Then 別の message_id を持つ新しいメッセージとして Archive・Manifest に記録される"
          - "Given 同名ファイルが同一収集秒内に複数回収集された(例: push 受信モードでの短時間の再 put) When Collect が実行される Then 連番付与により別々の message_id が採番され、先行メッセージの Archive・Manifest が上書きされない"
        affected_models:
          - type: "condition"
            action: "add"
            target: "message_id採番"
      - id: "SPEC-007-02"
        specification: "デーモンの再起動・処理中断後の再開で二重配信しない"
        acceptance_criteria:
          - "Given 配信途中で中断したメッセージがある When デーモンを再起動する Then 未配信の Subscription にのみ配信され、配信済みへ重複配置されない"
        affected_models:
          - type: "state"
            action: "modify"
            target: "メッセージ配送状態"

  - id: "REQ-008"
    requirement: "Archive から過去のファイルを再送(Replay)したい"
    reason: "「先月分を再投入したい」のような障害復旧・遡及処理の要望に応えるため。Archive があることで GET/DELETE 方式では不可能だった再送が可能になる"
    priority: "must"
    specifications:
      - id: "SPEC-008-01"
        specification: "Archive に保存済みのファイルを、Topic・期間(またはメッセージ指定)・宛先 Subscription を指定して再送できる。Replay も Manifest に記録する"
        acceptance_criteria:
          - "Given Archive に先月分のファイルが保存されている When 対象範囲と宛先 Subscription を指定して Replay を実行する Then 指定した Subscription にのみ該当ファイルが再配置される"
          - "Given Replay を実行した When Manifest を参照する Then 再送の配送履歴が記録されている"
        affected_models:
          - type: "buc"
            action: "add"
            target: "ファイルを再送する"

  - id: "REQ-009"
    requirement: "配信に失敗し続けたメッセージをリトライし、規定回数を超えたら DLQ へ隔離したい"
    reason: "一時的な障害は自動回復させ、恒久的な失敗は滞留させずに隔離して運用者が判断できるようにするため。将来の Messaging 基盤(Kafka / RabbitMQ / Google Pub/Sub)移行時にも DLQ の概念が一致し橋渡しになる"
    priority: "must"
    specifications:
      - id: "SPEC-009-01"
        specification: "配信失敗はリトライし、規定回数を超えたら DLQ へ隔離して Manifest に記録する"
        acceptance_criteria:
          - "Given ある Subscription への配信が一時的に失敗する When リトライが実行される Then 規定回数以内に成功すれば delivered になる"
          - "Given 配信が規定回数失敗した When 処理を継続する Then 該当メッセージが DLQ へ隔離され Manifest に dlq として記録される"
        affected_models:
          - type: "information"
            action: "add"
            target: "DLQ"
          - type: "state"
            action: "modify"
            target: "メッセージ配送状態"
          - type: "condition"
            action: "add"
            target: "リトライ上限"

  - id: "REQ-010"
    requirement: "死活監視と Topic ごとの異常検知に使えるメトリクスを公開したい"
    reason: "常駐デーモンとして運用するため、止まっていないか(死活)と、Topic 単位で収集・配信が滞っていないか(異常検知)を外部監視基盤から観測できる必要がある"
    priority: "must"
    specifications:
      - id: "SPEC-010-01"
        specification: "デーモンが HTTP で Prometheus 形式の /metrics と死活監視用の /healthz を公開する"
        acceptance_criteria:
          - "Given デーモンが稼働中 When /healthz にアクセスする Then 正常応答が返る"
          - "Given デーモンが稼働中 When /metrics にアクセスする Then Prometheus 形式のメトリクスが返る"
        affected_models:
          - type: "buc"
            action: "add"
            target: "配信基盤を監視する"
          - type: "external_system"
            action: "add"
            target: "監視基盤"
      - id: "SPEC-010-02"
        specification: "Topic ごとの異常検知に使える粒度(topic 別の最終収集時刻 / 処理件数 / 配信失敗数 / DLQ 件数 / 滞留数 等)のメトリクスを出す。しきい値判定・アラート発報は外部監視基盤(Prometheus / Grafana 等)の責務とする"
        acceptance_criteria:
          - "Given ある Topic の収集が止まっている When /metrics を参照する Then topic 別の最終収集時刻から異常を判定できる"
          - "Given ある Topic で配信失敗・DLQ が発生している When /metrics を参照する Then topic 別の失敗数・DLQ 件数が確認できる"
        affected_models:
          - type: "information"
            action: "add"
            target: "メトリクス"

  - id: "REQ-011"
    requirement: "レガシー現場のサーバへ容易に導入・運用できる配布形態と設定にしたい"
    reason: "OSS として現場提案・導入する際の障壁を最小にするため。レガシー現場はランタイム追加が難しいことが多い"
    priority: "must"
    specifications:
      - id: "SPEC-011-01"
        specification: "Go 実装のシングルバイナリとして配布する(Linux 主対象 + macOS 動作)。MIT ライセンスの OSS とする"
        acceptance_criteria:
          - "Given Linux サーバ When バイナリ 1 個を配置して設定 YAML を与える Then 追加ランタイムなしで動作する"
        affected_models:
          - type: "business_policy"
            action: "add"
            target: "OSS配布方針"
      - id: "SPEC-011-02"
        specification: "設定は単一 YAML(topics / 収集ソース / subscriptions / ポーリング間隔 / retention / リトライ / メトリクスポート)。認証情報は YAML への平文記述も許容しつつ、環境変数参照(${ENV_VAR})と鍵ファイルパス指定を推奨として README で案内する"
        acceptance_criteria:
          - "Given 認証情報を ${ENV_VAR} で参照する設定 When デーモンを起動する Then 環境変数の値で認証される"
          - "Given 鍵ファイルパスを指定した SFTP/SCP 設定 When Collect を実行する Then 鍵認証で収集できる"
        affected_models:
          - type: "information"
            action: "modify"
            target: "設定"
          - type: "variation"
            action: "add"
            target: "認証方式"
      - id: "SPEC-011-03"
        specification: "Docker コンテナイメージを提供し、Windows の開発 PC(Docker Desktop)でも動作確認できる。docker compose で一式(file-pubsub + 収集元 FTP/SFTP サーバの例)を起動できる動作確認環境を同梱する"
        acceptance_criteria:
          - "Given Docker Desktop が動く Windows 開発 PC When docker compose で動作確認環境を起動する Then file-pubsub と収集元サーバの例が起動し、収集から配信までを確認できる"
        affected_models:
          - type: "variation"
            action: "add"
            target: "配布形態"
      - id: "SPEC-011-04"
        specification: "構造化ログを出力する(運用者が障害調査できる粒度)"
        acceptance_criteria:
          - "Given 配信失敗が発生した When ログを参照する Then どのメッセージのどの Subscription 配信が失敗したか特定できる"
        affected_models:
          - type: "information"
            action: "add"
            target: "ログ"

  - id: "REQ-012"
    requirement: "既存の pull 型収集を維持したまま、Producer が file-pubsub のアクセスできる受信ディレクトリへ直接 put したファイルを取り込む push(put)受信モードを追加したい"
    reason: "現状は pull 型のみで、file-pubsub が polling_interval ごとにリモート領域(FTP/SFTP/SCP/local)を List → Fetch → Delete で取りに行く。Producer によっては file-pubsub が共有/ローカルディレクトリへ直接出力する受け口の方が自然で、リモート領域への中継を挟まずに連携できる。pull 型を使う既存現場もあるため両方を残し、Producer 無改修の前提も維持する"
    priority: "must"
    specifications:
      - id: "SPEC-012-01"
        specification: "収集ソース種別に push(put)受信モードを追加し、Topic ごとに既存 pull 型(FTP/SFTP/SCP/ローカルディレクトリの List → Fetch → Delete)と排他で選択できる。push 受信モードの受け口は file-pubsub がアクセスできる共有/ローカルの受信ディレクトリで、Producer がそこへファイルを put する。後段(Archive / Fan-out / Manifest / Retry / Retention)はソース種別に依存せず既存処理をそのまま流用する"
        acceptance_criteria:
          - "Given Topic の収集ソースが push 受信モード(受信ディレクトリ指定)に設定されている When Producer が受信ディレクトリへファイルを put する Then ファイルが取り込まれ Archive へ保存され Fan-out される"
          - "Given 既存 Topic が pull 型(FTP/SFTP/SCP/local)に設定されている When push 受信モードの Topic を別途追加する Then 既存 pull 型 Topic の収集・配信は変更なく動作し、両モードが同一デーモンで併存する"
          - "Given push 受信モードで取り込まれたメッセージ When Archive / Fan-out / Manifest / Retry / Retention の各処理を確認する Then pull 型と同一の後段処理が適用される"
        affected_models:
          - type: "variation"
            action: "modify"
            target: "収集ソース種別"
          - type: "external_system"
            action: "add"
            target: "受信ディレクトリ"
          - type: "external_system"
            action: "modify"
            target: "Producerシステム"
          - type: "information"
            action: "modify"
            target: "収集ソース"
          - type: "information"
            action: "modify"
            target: "設定"
          - type: "buc"
            action: "modify"
            target: "ファイルを収集する(Collect)"
      - id: "SPEC-012-02"
        specification: "push 受信モードでの取り込み後の元ファイル処理は、既存の元ファイル処理方式(回収=delete / 残す=copy)を流用するが、対象が受信ディレクトリのファイルに変わる。回収では file-pubsub が受信ディレクトリのファイルを削除し、残す(copy)では受信ディレクトリに残したまま処理済み管理で重複取り込みを防ぐ"
        acceptance_criteria:
          - "Given push 受信モード・回収(delete)設定の Topic When 取り込みが完了する Then 受信ディレクトリから該当ファイルが削除される"
          - "Given push 受信モード・残す(copy)設定の Topic When 同じファイルが受信ディレクトリに残ったまま次の取り込み契機が来る Then 処理済み管理により再取り込みされない"
        affected_models:
          - type: "variation"
            action: "modify"
            target: "元ファイル処理方式"
          - type: "condition"
            action: "modify"
            target: "元ファイル処理判定"
          - type: "information"
            action: "modify"
            target: "処理済み管理"
          - type: "state"
            action: "modify"
            target: "元ファイル収集状態"

  - id: "REQ-013"
    requirement: "push 受信モードの取り込み契機を、イベント駆動とフォールバックポーリングのハイブリッドにしたい"
    reason: "受信ディレクトリの共有 FS 実体は環境により異なり(ローカルディスク / NFS / SMB)、稼働時には未確定なこともある。ローカルディスクなら fsnotify によるイベント駆動で即時反応できるが、NFS/SMB では fsnotify のイベントを取りこぼすため、低頻度のフォールバックポーリングで確実に拾う必要がある。両対応により共有 FS の実体に依存せず取り込みできる"
    priority: "must"
    specifications:
      - id: "SPEC-013-01"
        specification: "push 受信モードでは fsnotify による受信ディレクトリのイベント駆動監視で、ファイル出現を即時に取り込み契機とする。共有 FS がローカルディスクの場合は即時反応する"
        acceptance_criteria:
          - "Given push 受信モードでローカルディスクの受信ディレクトリを監視中 When Producer がファイルを put する Then ポーリング間隔を待たずに(イベント駆動で)取り込みが開始される"
        affected_models:
          - type: "variation"
            action: "add"
            target: "取り込みトリガー方式"
          - type: "information"
            action: "modify"
            target: "収集ソース"
          - type: "buc"
            action: "modify"
            target: "ファイルを収集する(Collect)"
      - id: "SPEC-013-02"
        specification: "fsnotify のイベントを取りこぼす環境(NFS/SMB 等)に備え、低頻度のフォールバックポーリングを併用する。イベント駆動で拾えなかったファイルもフォールバックポーリングで取り込まれる"
        acceptance_criteria:
          - "Given push 受信モードで fsnotify がイベントを通知しない共有 FS(NFS/SMB)上の受信ディレクトリ When Producer がファイルを put する Then フォールバックポーリングの周期内に該当ファイルが取り込まれる"
          - "Given イベント駆動とフォールバックポーリングの両方が同一ファイルを検知しうる状況 When 取り込みが実行される Then 同一ファイルは二重取り込みされない(処理済み管理・message_id 採番で冪等)"
        affected_models:
          - type: "variation"
            action: "add"
            target: "取り込みトリガー方式"
          - type: "information"
            action: "modify"
            target: "設定"
          - type: "condition"
            action: "modify"
            target: "message_id採番"

  - id: "REQ-014"
    requirement: "push 受信モードで、Producer の出力パターンに応じて書き込み完了の検知方式と、その判定に使うサフィックス(一時拡張子 / 完了マーカー拡張子)を設定で選べるようにしたい"
    reason: "受信ディレクトリへ put される際の書き込み完了の表し方は Producer により異なる。サイズ・mtime が安定するもの、一時名から正式名へ rename するもの、完了マーカーを別途置くものがある。さらに rename の一時拡張子や完了マーカーの拡張子も Producer ごとに異なり(.tmp / .part、.done / .ok / .complete 等)、固定値では既存 Producer をそのまま受けられない。file-pubsub の中核価値は『上流/下流の外部IF仕様を一切変更せず、向き先を file-pubsub に変えるだけで並行稼働・段階的切替ができる』ことであり、Producer 無改修の前提を満たすには完了検知方式に加えサフィックスも設定可能である必要がある"
    priority: "must"
    specifications:
      - id: "SPEC-014-01"
        specification: "完了検知方式を収集ソース設定で選択できる: (a)安定判定(既存 stability_check: サイズ・mtime の安定待ち) (b)rename 方式(一時拡張子付きの名前で書き込み後、正式名へ rename された出現で取り込み) (c)done マーカー方式(対象 xxx に対応するマーカーが置かれたら xxx を取り込み対象にする)。選択した方式で書き込み完了と判定したファイルのみを取り込む"
        acceptance_criteria:
          - "Given 完了検知=安定判定 の push 受信モード When Producer が受信ディレクトリへ書き込み中 Then サイズ・mtime が安定するまで取り込まれず、安定後に取り込まれる"
          - "Given 完了検知=rename 方式 の push 受信モード When Producer が xxx.csv.tmp で書き込み後 xxx.csv へ rename する Then 正式名 xxx.csv の出現を契機に取り込まれ、一時拡張子付きの名前は取り込み対象としない"
          - "Given 完了検知=done マーカー方式 の push 受信モード When Producer が xxx を置いた後にマーカーを置く Then マーカーの出現を契機に xxx が取り込み対象になり、マーカー自体は配信対象としない"
        affected_models:
          - type: "condition"
            action: "modify"
            target: "書き込み完了判定"
          - type: "variation"
            action: "add"
            target: "完了検知方式"
          - type: "information"
            action: "modify"
            target: "収集ソース"
          - type: "state"
            action: "modify"
            target: "元ファイル収集状態"
      - id: "SPEC-014-02"
        specification: "done マーカー方式では、対象ファイルの取り込み後にマーカーファイルの後始末を行う。元ファイル処理方式(回収=delete / 残す=copy)に整合し、回収時はマーカーも削除し、残す時はマーカーを処理済み管理で識別して重複契機を防ぐ。残す(copy)で既に処理済みのマーカーは新たな完了契機にしない(同名で内容の異なる本体を再 put した場合は、新しいマーカーが置かれるまで取り込まない)"
        acceptance_criteria:
          - "Given 完了検知=done マーカー・回収(delete)設定 When xxx を取り込む Then xxx とそのマーカーの双方が受信ディレクトリから削除される"
          - "Given 完了検知=done マーカー・残す(copy)設定 When 同じマーカーが残ったまま次の契機が来る Then 処理済み管理により xxx が再取り込みされない"
          - "Given 完了検知=done マーカー・残す(copy)設定で既に処理済みのマーカーが残っている When 同名で内容の異なる本体が再 put される Then 既存の処理済みマーカーでは取り込まれず、新しいマーカーが置かれてから取り込まれる"
        affected_models:
          - type: "condition"
            action: "modify"
            target: "元ファイル処理判定"
          - type: "information"
            action: "modify"
            target: "処理済み管理"
          - type: "state"
            action: "modify"
            target: "元ファイル収集状態"
      - id: "SPEC-014-03"
        specification: "完了検知設定は completion: { mode, suffix } のネスト構造とする。mode は stability(既定) / rename / marker。suffix は rename の一時拡張子・marker のマーカー拡張子を表し、Producer の既存規約に合わせて設定できる(省略時の既定は rename=.tmp、marker=.done。stability では未使用)。これにより Producer が .tmp/.done 以外の規約を使っていても無改修のまま file-pubsub 側設定だけで受け取れ、外部IF無変更での向き先切替による並行稼働・段階的移行が可能になる"
        acceptance_criteria:
          - "Given 完了検知=rename・suffix=.part の push 受信モード When Producer が xxx.csv.part で書き込み後 xxx.csv へ rename する Then 正式名 xxx.csv の出現を契機に取り込まれ、xxx.csv.part は取り込み対象としない"
          - "Given 完了検知=marker・suffix=.ok の push 受信モード When Producer が xxx を置いた後に xxx.ok を置く Then xxx.ok の出現を契機に xxx が取り込まれ、xxx.ok 自体は配信対象としない"
          - "Given 完了検知=rename で suffix を省略 When 設定を読み込む Then suffix は既定値 .tmp として扱われる"
          - "Given 完了検知=marker で suffix を省略 When 設定を読み込む Then suffix は既定値 .done として扱われる"
        affected_models:
          - type: "variation"
            action: "modify"
            target: "完了検知方式"
          - type: "condition"
            action: "modify"
            target: "書き込み完了判定"
          - type: "information"
            action: "modify"
            target: "設定"

  - id: "REQ-015"
    requirement: "VIP + NFS で同一 data_dir を共有する複数ホスト構成で、ファイル操作を行う serve プロセスを常に1つだけにしたまま、active/standby の自動フェイルオーバーに対応したい"
    reason: "現状は単一インスタンス前提(HAなし)で、サーバ障害時は再起動による復旧しかできず可用性が不足する。Consumer 更改での並行稼働を支える配信基盤がサーバ障害で止まると業務影響が大きい。VIP で束ねた複数ホストと NFS 共有 data_dir を用いれば、single-writer(serve は常に1つ)を維持したまま active/standby で冗長化し、障害時に standby が自動昇格して配信を継続できる"
    priority: "must"
    specifications:
      - id: "SPEC-015-01"
        specification: "lock を lease レコード化する。lease は hostname + boot-id + acquired_at + renewed_at + ttl を持ち、active な serve が heartbeat で renewed_at を定期更新する。現状の PID 生存確認(os.FindProcess + Signal(0))による stale 判定はマルチホストで他ホストの PID を判定できず破綻するため、lease の renewed_at + ttl 超過による stale 判定へ置換する"
        acceptance_criteria:
          - "Given lease 方式の設定 When active な serve が稼働中 Then heartbeat 間隔ごとに lease の renewed_at が更新される"
          - "Given 別ホストで稼働していた active が renewed_at を ttl を超えて更新していない When standby が lease を確認する Then その lease は stale と判定される(PID 生存確認には依存しない)"
          - "Given lease に hostname + boot-id + acquired_at + renewed_at + ttl が記録されている When lease レコードを参照する Then どのホスト・どの起動世代が active かを識別できる"
        affected_models:
          - type: "information"
            action: "modify"
            target: "Lock"
          - type: "state"
            action: "modify"
            target: "Lock状態"
          - type: "condition"
            action: "modify"
            target: "二重起動防止"
      - id: "SPEC-015-02"
        specification: "唯一性の保証方式を設定で切り替え・併用できる。方式B(lease 自動奪取: file-pubsub 単体で TTL 失効により standby が自動昇格)と、方式A(外部クラスタ委譲: Pacemaker/keepalived 等の fencing が唯一性を保証し、VIP と serve を同一リソースグループで束ねる)を選択でき、同一バイナリで両環境をカバーする"
        acceptance_criteria:
          - "Given 方式B(lease 自動奪取)の設定 When active の lease が ttl 失効する Then standby が lease を奪取して active へ自動昇格し配信を継続する"
          - "Given 方式A(外部クラスタ委譲)の設定 When 外部クラスタ(Pacemaker/keepalived 等)が serve リソースを起動/停止する Then file-pubsub は TTL 失効による自動奪取を行わず、外部クラスタの fencing による唯一性保証に委ねる"
          - "Given 同一バイナリ When 方式A と方式B のいずれの設定でも起動する Then どちらの冗長構成でも動作する"
        affected_models:
          - type: "variation"
            action: "add"
            target: "唯一性保証方式"
          - type: "information"
            action: "modify"
            target: "設定"
          - type: "external_system"
            action: "add"
            target: "外部クラスタ"
      - id: "SPEC-015-03"
        specification: "lease 方式では heartbeat で lease を更新し、standby は lease の ttl 失効を検知して昇格する。デーモン稼働状態に standby(lease 待機)を含め、active への昇格・active からの降格(lease 喪失/停止)を遷移として扱う"
        acceptance_criteria:
          - "Given lease を保持できない2台目以降の serve When 起動する Then standby として lease の ttl 失効を待機する(二重 serve を起こさない)"
          - "Given standby が active の lease 失効を検知した When lease を奪取する Then standby から active へ昇格し収集・配信サイクルを開始する"
          - "Given active が lease を更新できなくなった(NFS 断・プロセス停止等) When ttl を超過する Then その serve は active を継続せず、他ノードの昇格を妨げない"
        affected_models:
          - type: "state"
            action: "modify"
            target: "デーモン稼働状態"
          - type: "state"
            action: "modify"
            target: "Lock状態"
          - type: "buc"
            action: "modify"
            target: "デーモンを起動する"

  - id: "REQ-016"
    requirement: "lease 方式の split-brain による被害を、データ破損・喪失なく「高々1メッセージの重複配信」に限定したい"
    reason: "lease 方式では active の lease 失効判定と新 active の昇格の間に、旧 active がまだ動いている split-brain の窓が原理的に残る。この窓を運用上許容するには、被害がデータ破損・喪失に至らず、既存の at-least-once 許容範囲(高々1メッセージの重複配信)に収まることを保証する必要がある"
    priority: "must"
    specifications:
      - id: "SPEC-016-01"
        specification: "split-brain の窓で2つの serve が一時的に同じ data_dir を操作しても、AtomicWrite 配置 + at-least-once 冪等再開(resumeArchiving)+ Manifest/処理済み照合の fail-closed 冪等により、被害を高々1メッセージの重複配信に限定し、データ破損・喪失は起こさない"
        acceptance_criteria:
          - "Given split-brain の窓で2つの serve が同一 data_dir を操作する When Subscription へ配置する Then AtomicWrite(一時名→rename)により正式名のファイルは常に完全な内容で、途中状態は露出しない"
          - "Given split-brain 中に一方が中断・再開する When resumeArchiving が走る Then at-least-once の冪等再開により未配信のみ配置され、データの喪失は起きない(重複は高々1メッセージ)"
          - "Given 冪等照合(Manifest/処理済み)の I/O が失敗した When 取り込み/配置を判断する Then fail-closed で安全側に倒し(衝突なし/未処理と誤って楽観視しない)、既存メッセージの上書きを避ける"
        affected_models:
          - type: "condition"
            action: "modify"
            target: "AtomicWrite配置"
          - type: "condition"
            action: "modify"
            target: "二重配信防止"
          - type: "condition"
            action: "modify"
            target: "message_id採番"
          - type: "buc"
            action: "modify"
            target: "冪等に処理を再開する"

  - id: "REQ-017"
    requirement: "lease 方式が前提とする共有 FS・時刻同期・TTL 設定の制約を明示し、設定で安全側に運用できるようにしたい"
    reason: "lease/TTL 判定は時刻と NFS の属性キャッシュ挙動に依存する。前提(NFSv4 推奨・NTP 時刻同期・lease TTL を属性キャッシュ最大より十分大きく取る)を満たさないと唯一性が崩れるため、制約を明示し設定で安全側に倒せる必要がある"
    priority: "must"
    specifications:
      - id: "SPEC-017-01"
        specification: "lease 方式は NFSv4(O_CREATE|O_EXCL の原子性)を推奨し、NTP による時刻同期を前提とする。lease TTL は NFS の属性キャッシュ(actimeo、既定最大60s)より十分大きく設定でき、既定値も属性キャッシュより大きく取る。pull型(sftp/ftp/local)は active/standby のどちらが引いても同一ソースを引き、VIP 無関係で lease 保持者(active)だけが pull/archive する"
        acceptance_criteria:
          - "Given NFSv4 + NTP 同期環境 When lease TTL を属性キャッシュ最大(actimeo 既定60s)より十分大きく設定する Then lease の renewed_at がキャッシュ遅延で誤って stale 判定されない"
          - "Given lease TTL を省略 When 設定を読み込む Then 既定 TTL は属性キャッシュ最大より十分大きい値として扱われる"
          - "Given active/standby の複数ホスト When lease 保持者(active)だけが pull/archive する Then standby は lease を保持するまで pull/archive せず、二重収集しない"
        affected_models:
          - type: "information"
            action: "modify"
            target: "設定"
          - type: "external_system"
            action: "modify"
            target: "リモートファイル領域"
      - id: "SPEC-017-02"
        specification: "方式A(外部クラスタ委譲)では VIP と serve を同一リソースグループで束ねる。push(put)受信モードでは「serve が居ないノードに VIP が付く」窓に注意する運用を前提とし(fsnotify は NFS で効かないためフォールバックポーリング前提、これは対応済み)、受信ディレクトリ取り込みは active な serve(VIP と同居)で行う"
        acceptance_criteria:
          - "Given 方式A で VIP と serve を同一リソースグループで束ねた構成 When フェイルオーバーが起きる Then VIP と serve が同じノードへ移動し、serve の居ないノードへ VIP だけが付く窓を最小化する"
          - "Given push 受信モードかつ NFS 上の受信ディレクトリ When active な serve が取り込む Then fsnotify ではなくフォールバックポーリングで確実に取り込む(fsnotify は NFS で効かない)"
        affected_models:
          - type: "external_system"
            action: "modify"
            target: "外部クラスタ"
          - type: "external_system"
            action: "modify"
            target: "受信ディレクトリ"
          - type: "information"
            action: "modify"
            target: "設定"

  - id: "REQ-018"
    requirement: "アーキテクチャと非機能要求の単一インスタンス前提(HAなし)を、active/standby 冗長化ありへ見直したい"
    reason: "本変更により単一インスタンス前提が成立しなくなる。アーキの設計判断(CTP-006 単一インスタンス前提)と NFR の可用性グレード(A.2.1.1 サーバ内冗長化 Lv1: 冗長化なし、再起動で復旧)を、active/standby 冗長化ありに整合させないと仕様と実態が乖離する"
    priority: "should"
    specifications:
      - id: "SPEC-018-01"
        specification: "アーキテクチャの単一インスタンス前提(HAなし)の設計判断を見直し、active/standby 冗長化(lease 方式 / 外部クラスタ委譲)を前提に再定義する。NFR の可用性(サーバ内冗長化)を「冗長化なし・再起動で復旧」から「active/standby 冗長化あり・自動フェイルオーバー」へ引き上げる"
        acceptance_criteria:
          - "Given 単一インスタンス前提の設計判断(HAなし) When 本変更を反映する Then active/standby 冗長化を前提とした設計判断へ更新される"
          - "Given NFR の可用性が冗長化なし(再起動で復旧)である When 本変更を反映する Then active/standby 冗長化ありの自動フェイルオーバーへ引き上げられる"
        affected_models:
          - type: "business_policy"
            action: "add"
            target: "冗長構成方針"
