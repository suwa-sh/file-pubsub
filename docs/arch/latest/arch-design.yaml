          description: "DLQ 件数"
          nullable: false
          primary_key: false
        - name: "backlog_count"
          type: "integer"
          description: "滞留数"
          nullable: false
          primary_key: false
      relationships: []
    - id: "E-013"
      name: "ログ"
      source_info: "情報: ログ"
      model_type: "event"
      attributes:
        - name: "logged_at"
          type: "datetime"
          description: "出力日時"
          nullable: false
          primary_key: false
        - name: "message_id"
          type: "string"
          description: "対象メッセージの message_id"
          nullable: true
          primary_key: false
        - name: "topic_name"
          type: "string"
          description: "Topic 名"
          nullable: true
          primary_key: false
        - name: "subscription_name"
          type: "string"
          description: "Subscription 名"
          nullable: true
          primary_key: false
        - name: "event_type"
          type: "string"
          description: "イベント種別"
          nullable: false
          primary_key: false
        - name: "error_detail"
          type: "text"
          description: "エラー内容"
          nullable: true
          primary_key: false
      relationships:
        - target_entity: "E-003"
          type: "N:1"
          description: "どの Subscription の配信イベントかを記録する"
  storage_mapping:
    - entity_id: "E-001"
      storage_type: "file"
      reason: "単一 YAML 設定ファイル。外部 DB を使わない制約と導入容易性のため"
      confidence: "user"
    - entity_id: "E-002"
      storage_type: "file"
      reason: "設定 YAML 内の Topic 定義として保持する"
      confidence: "user"
    - entity_id: "E-003"
      storage_type: "file"
