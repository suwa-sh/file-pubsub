          type: "1:1"
          description: "処理済み記録は収集済みメッセージに対応する"
    - id: "E-010"
      name: "Archiveファイル"
      source_info: "情報: Archiveファイル"
      model_type: "event"
      attributes:
        - name: "archive_path"
          type: "string"
          description: "保存先パス(Topic 別。archive/{topic}/ 配下)"
          nullable: false
          primary_key: true
        - name: "topic_name"
          type: "string"
          description: "Topic 名"
          nullable: false
          primary_key: false
        - name: "message_id"
          type: "string"
          description: "対応するメッセージの message_id"
          nullable: false
          primary_key: false
        - name: "original_file_name"
          type: "string"
          description: "元ファイル名"
          nullable: false
          primary_key: false
        - name: "file_content"
          type: "text"
          description: "ファイル内容(pass-through で保全)"
          nullable: false
          primary_key: false
        - name: "saved_at"
          type: "datetime"
          description: "保存日時"
          nullable: false
          primary_key: false
        - name: "retention_deadline"
          type: "datetime"
          description: "保持期限"
          nullable: false
          primary_key: false
      relationships: []
    - id: "E-011"
      name: "Lock"
      source_info: "情報: Lock"
      model_type: "resource_mutable"
      attributes:
        - name: "hostname"
          type: "string"
          description: "lease 保持ノードのホスト名(マルチホスト識別)。旧スキーマの lock_holder_process_info(PID 文字列)は lease レコード化に伴い廃止し、所有者は hostname + boot_id で識別する。単一インスタンス運用(high_availability 省略)では lock ファイルの存在で二重起動を防ぐ(PID フィールドは持たない)"
          nullable: false
          primary_key: false
        - name: "boot_id"
          type: "string"
          description: "起動世代識別子(boot-id)。同一ホストの再起動を区別する"
          nullable: false
          primary_key: false
        - name: "acquired_at"
          type: "datetime"
          description: "lease 取得日時"
          nullable: false
          primary_key: false
        - name: "renewed_at"
          type: "datetime"
          description: "lease 更新日時。active が heartbeat で更新する。stale 判定(renewed_at + ttl 超過)の基準。heartbeat は所有者検証 + generation CAS(hostname/boot_id が自分自身 かつ generation が自分の最終書込値と一致する場合のみ更新)で旧 active の lease 奪い返し TOCTOU を防ぐ"
          nullable: false
          primary_key: false
        - name: "ttl"
          type: "integer"
          description: "lease 有効期間(秒)。renewed_at + ttl 超過で stale と判定し standby が奪取できる"
          nullable: false
          primary_key: false
        - name: "generation"
          type: "integer"
          description: "lease 世代カウンタ。取得・奪取のたびに +1 し、奪取側は観測した generation を進める。heartbeat 更新は generation CAS(read した generation が自分の最終書込値と一致する場合のみ更新)で直列化し、旧 active が新 active の lease を check→update の隙に上書きで奪い返す TOCTOU を generation 不一致で検出する(spec-decision-009)。NFS の原子性は実装依存のため完全な分散排他は保証せず exactly-once は約束しない(既知の制約)"
          nullable: false
          primary_key: false
      relationships:
        - target_entity: "E-001"
          type: "N:1"
          description: "Lock(lease)の TTL・heartbeat・唯一性保証方式は設定で規定される"
    - id: "E-012"
      name: "メトリクス"
