          reason: "条件「全Subscription同報配信」と Consumer 更改の並行稼働要件のため。NFR D.2.1.1 移行方式(Lv1 Consumer 切替は Subscription 並行稼働で実施)・D.5.1.1 移行リハーサル(Lv0 並行稼働で代替)への対応"
          source_model: "条件: 全Subscription同報配信 / 情報: Subscription / 外部システム: Consumerシステム(Current) / 外部システム: Consumerシステム(Next) / NFR D.2.1.1, NFR D.5.1.1"
