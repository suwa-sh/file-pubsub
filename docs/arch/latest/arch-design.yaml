              description: "リモート GET 中は一時名でダウンロードし、完了後に rename する。GET 後 DELETE は Archive 保存の成功を確認してから行う"
              reason: "条件「書き込み完了判定」「元ファイル処理判定」の安全な収集手順を収集コネクタの共通規約とするため"
              source_model: "条件: 書き込み完了判定 / 条件: 元ファイル処理判定 / 情報: 処理済み管理"
              confidence: "user"
      cross_layer_policies:
        - id: "CLP-001"
          name: "IF なし(直接依存)、IF は収集コネクタのみ"
          description: "レイヤー間は直接依存とし開発スピードを優先する。インターフェースを導入するのは差し替え要件が明確な収集コネクタ(gateway 層内)のみ。前提が崩れた場合に IF 導入で依存を内側に向ける"
          reason: "新規構築で疎結合化は過剰。変動点はソース種別(FTP/SFTP/SCP/local)に限定されるため"
          source_model: "バリエーション: 収集ソース種別"
          confidence: "user"
      cross_layer_rules:
        - id: "CLR-001"
          name: "エラーは usecase で分類し runtime で変換"
          description: "ドメイン・gateway のエラーは usecase でリトライ可否を分類し、runtime(および CLI)で終了コードと構造化ログに変換する"
          reason: "レイヤー責務の分離(判断は usecase、表現は外殻)のため"
          source_model: "情報: ログ / 条件: リトライ上限"
          confidence: "user"
      diagram_mermaid: |
        graph TD
          RT["L-daemon-runtime ランタイム層"] --> UC["L-daemon-usecase ユースケース層"]
          UC --> DM["L-daemon-domain ドメイン層"]
          UC --> GW["L-daemon-gateway ゲートウェイ層"]
          GW --> DM
    - tier_id: "tier-ops-cli"
      layers:
        - id: "L-cli-command"
          name: "コマンド層"
          responsibility: "サブコマンドの引数解析・バリデーション・出力整形(status のテーブル表示等)。処理本体は同一バイナリ内で共有する daemon ティアの usecase 層に委譲する"
          allowed_dependencies: []
          policies:
            - id: "LP-401"
              name: "status の出力整形"
              description: "Manifest の配送状態を topic / Subscription 別に集計し、運用者が再送判断・DLQ 対処判断に使えるテーブル形式で表示する"
              reason: "BUC「配送状況を確認するフロー」で運用者が単独で判断できる表示が必要なため"
              source_model: "情報: Manifest / アクター: 配信基盤運用者 / BUC: 配送状況を確認するフロー"
              confidence: "user"
          rules:
            - id: "LR-401"
              name: "引数バリデーション"
              description: "replay の Topic・期間(またはメッセージ指定)・宛先 Subscription 等の引数をコマンド層で検証し、不正な指定は実行前に終了コードで弾く"
              reason: "条件「Replay記録」の指定パラメータを誤配置前に検証するため"
              source_model: "条件: Replay記録 / 情報: 設定"
              confidence: "user"
      cross_layer_policies:
        - id: "CLP-101"
          name: "daemon ティアのレイヤー共有"
          description: "usecase / domain / gateway は tier-daemon-worker のレイヤーを単一バイナリのパッケージ共有で利用する。CLI 専用のビジネスロジックは持たない"
          reason: "ユーザー指定: 同一バイナリで usecase 層を共有し、配送ロジックの二重実装を避ける"
          source_model: "情報: Manifest / 情報: Archiveファイル"
          confidence: "user"
      cross_layer_rules:
        - id: "CLR-101"
          name: "CLI からのデータアクセスは共有 usecase 経由"
          description: "コマンド層は Manifest / Archive へ直接アクセスせず、共有する usecase 層(status 照会・Replay)を経由する"
          reason: "配送状態の読み書き規約(AtomicWrite・Manifest 記録)を一箇所に保つため"
          source_model: "なし"
          confidence: "default"
      diagram_mermaid: |
        graph TD
          CMD["L-cli-command コマンド層"] --> SUC["共有 usecase 層(tier-daemon-worker のパッケージ)"]
          SUC --> SDM["共有 domain 層"]
          SUC --> SGW["共有 gateway 層"]

data_architecture:
  entities:
    - id: "E-001"
      name: "設定"
      source_info: "情報: 設定"
      model_type: "resource_mutable"
      attributes:
        - name: "polling_interval"
          type: "integer"
          description: "ポーリング間隔(秒)"
          nullable: false
          primary_key: false
        - name: "archive_retention"
          type: "integer"
          description: "Archive 保持期間(retention、日数)"
          nullable: false
          primary_key: false
        - name: "retry_max_count"
          type: "integer"
          description: "リトライ上限回数"
          nullable: false
          primary_key: false
        - name: "metrics_port"
          type: "integer"
          description: "メトリクス公開用 HTTP ポート"
          nullable: false
          primary_key: false
        - name: "topic_definitions"
          type: "text"
          description: "Topic 定義一覧"
          nullable: false
          primary_key: false
        - name: "subscription_definitions"
          type: "text"
          description: "Subscription 定義一覧"
          nullable: false
          primary_key: false
        - name: "source_definitions"
          type: "text"
          description: "収集ソース定義一覧"
          nullable: false
          primary_key: false
        - name: "credential_refs"
          type: "text"
          description: "認証情報参照(環境変数参照/鍵ファイルパス)"
          nullable: true
          primary_key: false
        - name: "high_availability.uniqueness_method"
          type: "string"
          description: "唯一性保証方式(lease=方式B 自動奪取 / external_cluster=方式A 外部クラスタ委譲)。high_availability ブロック内。省略時=単一インスタンス運用。present 時の既定は lease。active/standby 冗長化での single-writer 維持方式"
          nullable: true
          primary_key: false
        - name: "high_availability.lease_ttl"
          type: "integer"
          description: "lease TTL(秒)。high_availability ブロック内。stale 判定境界(現在時刻 - renewed_at > ttl)。present 時の既定 90。NFS 属性キャッシュ最大(actimeo 既定 60s)より十分大きく取る。方式A でも観測用 lease に有効"
          nullable: true
          primary_key: false
        - name: "high_availability.heartbeat_interval"
          type: "integer"
          description: "heartbeat 間隔(秒)。high_availability ブロック内。active が lease の renewed_at を更新する周期。present 時の既定 lease_ttl/3。lease_ttl より十分小さく取る"
          nullable: true
          primary_key: false
        - name: "fallback_polling_interval"
          type: "integer"
          description: "フォールバックポーリング間隔(秒)。NFS 等で fsnotify が効かない受信ディレクトリ取り込みの保険"
          nullable: true
          primary_key: false
      relationships:
        - target_entity: "E-002"
          type: "1:N"
          description: "設定が複数の Topic を定義する"
        - target_entity: "E-003"
          type: "1:N"
          description: "設定が複数の Subscription を定義する"
        - target_entity: "E-004"
          type: "1:N"
          description: "設定が複数の収集ソースを定義する"
        - target_entity: "E-005"
          type: "1:N"
          description: "設定が認証情報を参照する"
        - target_entity: "E-011"
          type: "1:1"
          description: "設定の high_availability(uniqueness_method・lease_ttl・heartbeat_interval)が Lock(lease)の挙動を規定する。high_availability 省略時は単一インスタンス運用(lease 化しない)"
    - id: "E-002"
      name: "Topic"
      source_info: "情報: Topic"
      model_type: "resource_mutable"
      attributes:
        - name: "topic_name"
          type: "string"
          description: "Topic 名(orders / customers / invoices 等の論理的なファイル種別)"
          nullable: false
          primary_key: true
        - name: "description"
          type: "string"
          description: "Topic の説明"
          nullable: true
          primary_key: false
      relationships:
        - target_entity: "E-004"
          type: "N:1"
          description: "Topic は 1 つの収集ソースから収集される(収集ソースは複数 Topic を持ちうる)"
        - target_entity: "E-003"
          type: "1:N"
          description: "Topic 配下に複数の Subscription が定義される"
