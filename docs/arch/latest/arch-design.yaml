        - name: "isolation_reason"
          type: "string"
          description: "隔離理由"
          nullable: false
          primary_key: false
        - name: "failure_count"
          type: "integer"
          description: "失敗回数"
          nullable: false
          primary_key: false
        - name: "isolated_at"
          type: "datetime"
          description: "隔離日時"
          nullable: false
          primary_key: false
      relationships: []
    - id: "E-009"
      name: "処理済み管理"
      source_info: "情報: 処理済み管理"
