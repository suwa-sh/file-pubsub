meta:
  event_id: "20260620_213604_arch_refine_redundant_failover"
  trigger_event: "spec:20260620_171535_add_redundant_failover (codex 再レビュー 2巡目)"
  created_at: "2026-06-20T21:36:04"

# codex 再レビュー(2巡目)の arch 残指摘の差分。
# #9: 設定 E-001 のフラットな uniqueness_method/lease_ttl/heartbeat_interval を high_availability.* ネスト表記へ。
# #10: Lock E-011 の旧 PID フィールド lock_holder_process_info(nullable=false)を削除し lease 化に統一。
# 差分対象エンティティのみ記載(他は latest を維持)。

data_architecture:
  entities:
    - id: "E-001"
      name: "設定"
      source_info: "情報: 設定"
      model_type: "resource_mutable"
      attributes:
        - name: "polling_interval"
          type: "integer"
          description: "ポーリング間隔(秒)"
          nullable: false
          primary_key: false
        - name: "archive_retention"
          type: "integer"
          description: "Archive 保持期間(retention、日数)"
          nullable: false
          primary_key: false
        - name: "retry_max_count"
          type: "integer"
          description: "リトライ上限回数"
          nullable: false
          primary_key: false
        - name: "metrics_port"
          type: "integer"
          description: "メトリクス公開用 HTTP ポート"
          nullable: false
          primary_key: false
        - name: "topic_definitions"
          type: "text"
          description: "Topic 定義一覧"
          nullable: false
          primary_key: false
        - name: "subscription_definitions"
          type: "text"
          description: "Subscription 定義一覧"
          nullable: false
          primary_key: false
        - name: "source_definitions"
          type: "text"
          description: "収集ソース定義一覧"
          nullable: false
          primary_key: false
        - name: "credential_refs"
          type: "text"
          description: "認証情報参照(環境変数参照/鍵ファイルパス)"
          nullable: true
          primary_key: false
        - name: "high_availability.uniqueness_method"
          type: "string"
          description: "唯一性保証方式(lease=方式B 自動奪取 / external_cluster=方式A 外部クラスタ委譲)。high_availability ブロック内。省略時=単一インスタンス運用。present 時の既定は lease。active/standby 冗長化での single-writer 維持方式"
          nullable: true
          primary_key: false
        - name: "high_availability.lease_ttl"
          type: "integer"
          description: "lease TTL(秒)。high_availability ブロック内。stale 判定境界(現在時刻 - renewed_at > ttl)。present 時の既定 90。NFS 属性キャッシュ最大(actimeo 既定 60s)より十分大きく取る。方式A でも観測用 lease に有効"
          nullable: true
          primary_key: false
        - name: "high_availability.heartbeat_interval"
          type: "integer"
          description: "heartbeat 間隔(秒)。high_availability ブロック内。active が lease の renewed_at を更新する周期。present 時の既定 lease_ttl/3。lease_ttl より十分小さく取る"
          nullable: true
          primary_key: false
        - name: "fallback_polling_interval"
          type: "integer"
          description: "フォールバックポーリング間隔(秒)。NFS 等で fsnotify が効かない受信ディレクトリ取り込みの保険"
          nullable: true
          primary_key: false
      relationships:
        - target_entity: "E-002"
          type: "1:N"
          description: "設定が複数の Topic を定義する"
        - target_entity: "E-003"
          type: "1:N"
          description: "設定が複数の Subscription を定義する"
        - target_entity: "E-004"
          type: "1:N"
          description: "設定が複数の収集ソースを定義する"
        - target_entity: "E-005"
          type: "1:N"
          description: "設定が認証情報を参照する"
        - target_entity: "E-011"
          type: "1:1"
          description: "設定の high_availability(uniqueness_method・lease_ttl・heartbeat_interval)が Lock(lease)の挙動を規定する。high_availability 省略時は単一インスタンス運用(lease 化しない)"
    - id: "E-011"
      name: "Lock"
      source_info: "情報: Lock"
      model_type: "resource_mutable"
      attributes:
        - name: "hostname"
          type: "string"
          description: "lease 保持ノードのホスト名(マルチホスト識別)。旧スキーマの lock_holder_process_info(PID 文字列)は lease レコード化に伴い廃止し、所有者は hostname + boot_id で識別する。単一インスタンス運用(high_availability 省略)では lock ファイルの存在で二重起動を防ぐ(PID フィールドは持たない)"
          nullable: false
          primary_key: false
        - name: "boot_id"
          type: "string"
          description: "起動世代識別子(boot-id)。同一ホストの再起動を区別する"
          nullable: false
          primary_key: false
        - name: "acquired_at"
          type: "datetime"
          description: "lease 取得日時"
          nullable: false
          primary_key: false
        - name: "renewed_at"
          type: "datetime"
          description: "lease 更新日時。active が heartbeat で更新する。stale 判定(renewed_at + ttl 超過)の基準。heartbeat は所有者検証(hostname/boot_id が自分自身)に一致する場合のみ更新する"
          nullable: false
          primary_key: false
        - name: "ttl"
          type: "integer"
          description: "lease 有効期間(秒)。renewed_at + ttl 超過で stale と判定し standby が奪取できる"
          nullable: false
          primary_key: false
      relationships:
        - target_entity: "E-001"
          type: "N:1"
          description: "Lock(lease)の TTL・heartbeat・唯一性保証方式は設定の high_availability で規定される"
  storage_mapping:
    - entity_id: "E-011"
      storage_type: "file"
      reason: "共有 data_dir(NFSv4 推奨)上の lease ファイル(hostname/boot-id/acquired_at/renewed_at/ttl)。旧 PID フィールドは持たず所有者は hostname + boot_id で識別。renewed_at + ttl 超過で stale 判定し active/standby の single-writer を維持する。PID 生存確認に依存せずマルチホストで判定できる。単一インスタンス運用(high_availability 省略)では lock ファイルの存在で二重起動を防ぐ"
      confidence: "user"
