# file-pubsub 動作確認環境のサンプル設定 (docker-compose.yml とセット)。
# 認証情報は環境変数参照を推奨 (値は docker-compose.yml の environment で
# 注入している)。注意: 環境変数参照はコメント内でも展開されるため、
# ドル記号 + 波括弧の表記をコメントに書かないこと。
polling_interval: 5
archive_retention: 7
retry_max_count: 3
metrics_port: 9090
data_dir: /data

topics:
  # SFTP 収集の例 (atmoz/sftp)。GET 後 DELETE (既定) で回収する。
  - name: orders
    description: SFTP source example
    source:
      type: sftp
      host: sftp-server
      port: 22
      directory: /out
      auth:
        username: producer
        password: ${SFTP_PASSWORD}
      stability_check:
        interval: 2
      exclude_patterns:
        - "*.tmp"
        - "*.part"
        - ".*" # dotfile (.gitkeep 等) を収集しない
    subscriptions:
      - name: current
        directory: /data/subscriptions/orders/current
      - name: next
        directory: /data/subscriptions/orders/next

  # FTP 収集の例 (delfer/alpine-ftp-server、パッシブモード)。
  - name: customers
    description: FTP source example
    source:
      type: ftp
      host: ftp-server
      port: 21
      directory: /ftp/producer
      auth:
        username: producer
        password: ${FTP_PASSWORD}
      stability_check:
        interval: 2
      exclude_patterns:
        - "*.tmp"
        - "*.part"
        - ".*" # dotfile (.gitkeep 等) を収集しない
    subscriptions:
      - name: current
        directory: /data/subscriptions/customers/current
      - name: next
        directory: /data/subscriptions/customers/next

  # ローカルディレクトリ収集の例 (ホストの sources/local/ をマウント)。
  - name: invoices
    description: local directory source example
    source:
      type: local
      directory: /sources/local
      stability_check:
        interval: 2
      exclude_patterns:
        - "*.tmp"
        - "*.part"
        - ".*" # dotfile (.gitkeep 等) を収集しない
    subscriptions:
      - name: current
        directory: /data/subscriptions/invoices/current
      - name: next
        directory: /data/subscriptions/invoices/next

  # push 受信モード (inbox) の例。Producer がホストの sources/inbox/ へ直接 put し、
  # file-pubsub が fsnotify イベント駆動 + フォールバックポーリングで取り込む。
  # 完了検知は done マーカー方式: receipts_001.csv と receipts_001.csv.done を置くと取り込む。
  - name: receipts
    description: push receive (inbox) source example
    source:
      type: inbox
      directory: /sources/inbox
      completion:
        mode: marker # stability(既定) / rename / marker
        suffix: .done # marker の既定。Producer 規約に合わせ .ok 等へ変更可
      # fallback_poll_interval は省略時 polling_interval を流用
      exclude_patterns:
        - ".*" # dotfile (.gitkeep 等) を収集しない
    subscriptions:
      - name: current
        directory: /data/subscriptions/receipts/current
